<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Me | Student Portfolio</title>
    
</head>
<body>

    <main class="contact-container">
        <h1>Contact Us</h1>
        <p id="form-instructions" class="intro-text">Do you have a question or want to collaborate on a project? Send a message below.</p>

        <form action="" method="POST" aria-describedby="form-instructions">

            <div class="form-group">
                <label for="name">Full Name:</label>
                <input type="text" id="name" name="name" required aria-required="true" placeholder="e.g., Akwasi Boakye">
            </div><br>

            <div class="form-group">
                <label for="email">Email Address:</label>
                <input type="email" id="email" name="email" required aria-required="true" aria-describedby="email-hint" placeholder="indexNo@live.gctu.edu.gh">
                <span id="email-hint" class="hint-text"></span>
            </div><br>

            <div class="form-group">
                <label for="subject">Subject:</label>
                <input type="text" id="subject" name="subject" required aria-required="true" placeholder="Subject matter...">
            </div><br>

            <div class="form-group">
                <label for="message">Message:</label>
                <textarea id="message" name="message" rows="5" required aria-required="true" placeholder="Write your message here..."></textarea>
            </div><br>

            <button type="submit">Send Message</button>
            
        </form>
    </main>

</body>
</html>
